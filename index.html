    <!-- Structured Data: Law Firm -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LegalService",
      "name": "Dlamini Attorneys Inc.",
      "description": "Expert legal services for South Africans in family law, property law, labour law, criminal defence, and business law.",
      "url": "https://dlaminiattorneys.co.za",
      "telephone": "+27-11-000-0000",
      "email": "info@dlaminiattorneys.co.za",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Commissioner Street",
        "addressLocality": "Johannesburg",
        "addressRegion": "Gauteng",
        "postalCode": "2001",
        "addressCountry": "ZA"
      },
      "areaServed": {
        "@type": "Country",
        "name": "South Africa"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Legal Services",
        "itemListElement": [
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Family Law"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Property Law"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Labour Law"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Criminal Defence"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Business Law"}}
        ]
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "08:00",
          "closes": "17:00"
        }
      ]
    }
