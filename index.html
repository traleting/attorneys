<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Mbanjwa &amp; Associates | South African Law Firm | Employment Law &amp; Civil Litigation</title>
    <meta name="description" content="Mbanjwa &amp; Associates is a bespoke South African law firm founded by Ishmael Mbanjwa, offering employment law, civil litigation, family law and property support from Johannesburg with Durban satellite support." />
    <meta name="keywords" content="Mbanjwa Associates, South African attorney, Johannesburg lawyer, employment law South Africa, labour law, CCMA representation, bargaining council, Labour Court, civil litigation, family law, conveyancing support" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Mbanjwa &amp; Associates" />
    <link rel="canonical" href="https://mbanjwassociates.co.za/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mbanjwassociates.co.za/" />
    <meta property="og:title" content="Mbanjwa &amp; Associates | South African Law Firm" />
    <meta property="og:description" content="Accessible, practical and tailored legal services in employment law, civil litigation, family law and property support." />
    <meta property="og:image" content="https://images.pexels.com/photos/5668859/pexels-photo-5668859.jpeg?auto=compress&cs=tinysrgb&w=1200" />
    <meta property="og:locale" content="en_ZA" />
    <meta property="og:site_name" content="Mbanjwa &amp; Associates" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mbanjwassociates.co.za/" />
    <meta name="twitter:title" content="Mbanjwa &amp; Associates | South African Law Firm" />
    <meta name="twitter:description" content="Employment law, civil litigation, family law and property support for South African clients." />
    <meta name="twitter:image" content="https://images.pexels.com/photos/5668859/pexels-photo-5668859.jpeg?auto=compress&cs=tinysrgb&w=1200" />

    <!-- Geo Tags -->
    <meta name="geo.region" content="ZA" />
    <meta name="geo.placename" content="South Africa" />

    <!-- Structured Data: Law Firm -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LegalService",
      "name": "Mbanjwa & Associates",
      "description": "Bespoke South African law firm offering employment law, civil litigation, family law and property support.",
      "url": "https://mbanjwassociates.co.za",
      "telephone": "+27-73-392-2678",
      "email": "admin@mbanjwassociates.co.za",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Johannesburg",
        "addressRegion": "Gauteng",
        "addressCountry": "ZA"
      },
      "areaServed": {
        "@type": "Country",
        "name": "South Africa"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Legal Services",
        "itemListElement": [
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Employment Law and Labour Relations"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Civil Litigation"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Family Law"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Property and Conveyancing Support"}},
          {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Disciplinary Hearings"}}
        ]
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "08:00",
          "closes": "17:00"
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
